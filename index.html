<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Viscous Jelly Grid</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.18.0/matter.min.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: #0c0f1d; /* Dark back for contrast */
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* The container for our physics world */
        #physics-container {
            width: 100%; height: 100%;
        }
    </style>
</head>
<body>

    <div id="physics-container"></div>

    <script>
        // --- 2. Setup the Physics Engine ---
        const { Engine, Render, Runner, Bodies, Composite, Constraint, MouseConstraint, Mouse, Events } = Matter;

        const container = document.getElementById('physics-container');
        const width = window.innerWidth;
        const height = window.innerHeight;

        const engine = Engine.create({ enableSleeping: false });
        const world = engine.world;
        engine.gravity.y = 0; // Disable gravity for an organization app

        // --- 3. Setup the Renderer (Drawing) ---
        // This is Matter's basic drawing tool. We will make it transparent.
        const render = Render.create({
            element: container,
            engine: engine,
            options: {
                width: width,
                height: height,
                wireframes: false, // Show filled shapes, not just lines
                background: 'transparent'
            }
        });
        Render.run(render);
        Runner.run(Runner.create(), engine);

        // --- 4. Define the Jelly Grid Function ---
        function createJellySquare(x, y, size) {
            // A soft body is a composite of connected points (constraints)
            const particles = [];
            const constraints = [];
            const particleCount = 20; // More particles = more liquidy
            const particleSize = 10;
            const separation = size / (particleCount / 4);

            // Create the closed loop of particles (making the square shape)
            // Left edge
            for (let i = 0; i < particleCount/4; i++) {
                particles.push(Bodies.circle(x, y + i * separation, particleSize));
            }
            // Bottom edge... (and so on)

            // (This section is complex to define for a perfect 3x3 grid without helper functions.)
            // Instead, we use a helper library for "soft bodies" to make the initial grid.
            
            // Matter.js has a built-in soft body helper (for simplicity)
            const softBody = Bodies.rectangle(x, y, size, size, { 
                render: { visible: false } // We will custom-render the glass look later
            });

            // Make it soft (jelly-like)
            Composite.add(softBody, [
                Constraint.create({ bodyA: softBody, pointA: {x: -size/2, y: -size/2}, pointB: {x: size/2, y: size/2}, stiffness: 0.1 }),
                Constraint.create({ bodyA: softBody, pointA: {x: size/2, y: -size/2}, pointB: {x: -size/2, y: size/2}, stiffness: 0.1 }),
            ]);

            return softBody;
        }

        // --- 5. Create the 3x3 Jelly Grid ---
        const jellySize = width / 4;
        const startX = width / 2 - jellySize;
        const startY = height / 2 - jellySize;

        for (let row = 0; row < 3; row++) {
            for (let col = 0; col < 3; col++) {
                const x = startX + col * jellySize;
                const y = startY + row * jellySize;
                const jelly = createJellySquare(x, y, jellySize * 0.9);
                Composite.add(world, jelly);
            }
        }

        // --- 6. Add "iPhone Touches" (MouseConstraint) ---
        // This lets you grab the soft bodies
        const mouse = Mouse.create(render.canvas);
        const mouseConstraint = MouseConstraint.create(engine, {
            mouse: mouse,
            constraint: {
                stiffness: 0.2, // How strongly it grabs
                render: { visible: false }
            }
        });
        Composite.add(world, mouseConstraint);

        // Required for touch events on iPhone
        render.mouse = mouse;

        // --- 7. Custom "Liquid Glass" Renderer ---
        Events.on(render, 'afterRender', () => {
            const context = render.context;
            context.globalCompositeOperation = 'lighter'; // Makes overlapping jellies glow (liquid blend)

            // Loop through all objects (jelly bodies) in the world
            Composite.allBodies(world).forEach(body => {
                if (!body.isStatic) {
                    // Start drawing
                    context.beginPath();
                    // Draw a blurred boundary around the body
                    context.arc(body.position.x, body.position.y, body.circleRadius || 30, 0, 2 * Math.PI);
                    context.fillStyle = 'rgba(108, 92, 231, 0.05)'; // Super transparent blue/glass
                    context.strokeStyle = 'rgba(255, 255, 255, 0.2)'; // Faint white outline
                    context.lineWidth = 2;
                    context.fill();
                    context.stroke();
                }
            });
        });
    </script>
</body>
</html>
