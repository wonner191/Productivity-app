<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Viscous Jelly</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.18.0/matter.min.js"></script>
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background: #050510; overflow: hidden; 
        }
        #canvas { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script>
        const { Engine, Render, Runner, Bodies, Composite, Constraint, MouseConstraint, Mouse } = Matter;

        const canvas = document.getElementById('canvas');
        const engine = Engine.create();
        engine.gravity.y = 0; // No gravity for floaty jelly

        const render = Render.create({
            canvas: canvas,
            engine: engine,
            options: {
                width: window.innerWidth,
                height: window.innerHeight,
                wireframes: false,
                background: 'transparent'
            }
        });

        // --- THE JELLY MAKER ---
        function createJelly(x, y, size, color) {
            const columns = 4;
            const rows = 4;
            const particleRadius = 2;
            
            // Create a grid of tiny invisible particles
            const softBody = Matter.Composites.stack(x, y, columns, rows, 0, 0, (x, y) => {
                return Bodies.circle(x, y, particleRadius, {
                    frictionAir: 0.05,
                    collisionFilter: { group: Matter.Body.nextGroup(true) },
                    render: { fillStyle: color, opacity: 0.5 }
                });
            });

            // Connect particles with weak springs (the jelly glue)
            Matter.Composites.mesh(softBody, columns, rows, false, {
                stiffness: 0.03, // Low stiffness = more viscous/jelly
                render: { visible: true, strokeStyle: color, lineWidth: 1 }
            });

            Composite.add(engine.world, softBody);
            return softBody;
        }

        // --- CREATE 3x3 GRID ---
        const colors = ['#6c5ce7', '#00cec9', '#fab1a0', '#0984e3', '#e84393', '#fdcb6e', '#55efc4', '#a29bfe', '#81ecec'];
        const spacing = window.innerWidth / 4;

        for(let i=0; i<3; i++) {
            for(let j=0; j<3; j++) {
                createJelly(
                    spacing + (i * spacing) - 50, 
                    spacing + (j * spacing) - 50, 
                    60, 
                    colors[i * 3 + j]
                );
            }
        }

        // --- INTERACTION ---
        const mouse = Mouse.create(render.canvas);
        const mouseConstraint = MouseConstraint.create(engine, {
            mouse: mouse,
            constraint: {
                stiffness: 0.1,
                render: { visible: false }
            }
        });

        Composite.add(engine.world, mouseConstraint);
        
        // Fix for iPhone Touch
        render.mouse = mouse;

        Render.run(render);
        Runner.run(Runner.create(), engine);

        // Handle window resizing
        window.addEventListener('resize', () => {
            render.canvas.width = window.innerWidth;
            render.canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
