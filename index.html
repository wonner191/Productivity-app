<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Liquid Glass Grid</title>
    <style>
        :root {
            --bg-color: #0d1117; /* Dark background to make light effects pop */
            --glass-color: rgba(255, 255, 255, 0.03); /* Base subtle glass color */
            --border-color: rgba(255, 255, 255, 0.08); /* Grid lines */
            --light-color: rgba(108, 92, 231, 1); /* Main light (accent) */
            --blur: 20px; /* How blurry the glass effect is */
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: var(--bg-color);
            font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden;
            color: #ccc;
            -webkit-tap-highlight-color: transparent;
        }

        /* The canvas covers the whole screen */
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* The Glass UI overlay (for titles, etc.) */
        #glass-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none; /* Let touches pass through to canvas by default */
            z-index: 10;
        }

        /* A 'glass' panel style */
        .glass-panel {
            background: var(--glass-color);
            -webkit-backdrop-filter: blur(var(--blur));
            backdrop-filter: blur(var(--blur));
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 10px;
            color: #fff;
            pointer-events: auto; /* Allow interaction with panels */
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="glass-overlay">
        </div>

    <script>
        // Setup Canvas and Context
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('glass-overlay');

        // Resize function to make canvas fill screen and look sharp
        function resize() {
            // Adjust for DPI
            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            ctx.scale(dpr, dpr);
        }
        window.addEventListener('resize', resize);
        resize();

        // --- Grid Data ---
        // A simple array of points that define the connected grid lines
        // For a 3x3 grid, we need 4 vertical lines and 4 horizontal lines
        let gridPoints = []; 
        function generateGridPoints() {
            gridPoints = [];
            const cols = 3;
            const rows = 3;
            const spacingX = window.innerWidth / (cols);
            const spacingY = window.innerHeight / (rows);
            
            // Generate horizontal lines
            for (let i = 0; i <= rows; i++) {
                gridPoints.push({ x: 0, y: i * spacingY, type: 'h' });
            }
            // Generate vertical lines
            for (let i = 0; i <= cols; i++) {
                gridPoints.push({ x: i * spacingX, y: 0, type: 'v' });
            }
        }
        generateGridPoints();

        // --- Lighting Data ---
        // Store points where the user is touching (the 'lights')
        const touchLights = [];

        // --- The Main Rendering Loop (The Artist) ---
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height); // Clear the frame

            // 1. Draw the Base Connected Grid (Subtle Lines)
            ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--border-color');
            ctx.lineWidth = 1;
            gridPoints.forEach(pt => {
                ctx.beginPath();
                if (pt.type === 'h') {
                    ctx.moveTo(0, pt.y);
                    ctx.lineTo(canvas.width, pt.y);
                } else {
                    ctx.moveTo(pt.x, 0);
                    ctx.lineTo(pt.x, canvas.height);
                }
                ctx.stroke();
            });

            // 2. Draw the 'Liquid Glass' and 'Lighting' Effect
            // When a touch occurs, we draw a 'gradient light' that blends into the grid
            const lightColor = getComputedStyle(document.documentElement).getPropertyValue('--light-color');

            touchLights.forEach(light => {
                // Create a radial gradient (a blob of light)
                const gradient = ctx.createRadialGradient(
                    light.x, light.y, 10, // Inner circle
                    light.x, light.y, 100 // Outer circle (the radius of light)
                );
                
                // Set the gradient colors (blending from full light to transparent)
                gradient.addColorStop(0, lightColor.replace('1)', '0.3)')); // Softer inner light
                gradient.addColorStop(0.5, lightColor.replace('1)', '0.1)')); // Blend
                gradient.addColorStop(1, lightColor.replace('1)', '0)')); // Transparent edge
                
                // Draw the light blob
                ctx.fillStyle = gradient;
                ctx.fillRect(light.x - 100, light.y - 100, 200, 200);

                // Now, redraw any grid line that the light touch point is near, but thicker and brighter
                ctx.strokeStyle = lightColor.replace('1)', '0.8)'); // Brighter line color
                ctx.lineWidth = 2; // Thicker near the touch

                gridPoints.forEach(pt => {
                    ctx.beginPath();
                    if (pt.type === 'h' && Math.abs(light.y - pt.y) < 50) {
                        // Horizontal line near light: highlight the nearby section
                        ctx.moveTo(light.x - 70, pt.y);
                        ctx.lineTo(light.x + 70, pt.y);
                    } else if (pt.type === 'v' && Math.abs(light.x - pt.x) < 50) {
                        // Vertical line near light: highlight the nearby section
                        ctx.moveTo(pt.x, light.y - 70);
                        ctx.lineTo(pt.x, light.y + 70);
                    }
                    ctx.stroke();
                });
            });

            requestAnimationFrame(draw); // Loop continuously for smooth animation
        }
        draw(); // Start the loop

        // --- Handling Gestures (Touch/Pointer) ---
        canvas.addEventListener('pointerdown', (e) => {
            touchLights.push({ x: e.clientX, y: e.clientY, id: e.pointerId });
        });

        canvas.addEventListener('pointermove', (e) => {
            // Find the light associated with this pointer and update its position
            const light = touchLights.find(l => l.id === e.pointerId);
            if (light) {
                light.x = e.clientX;
                light.y = e.clientY;
            }
        });

        canvas.addEventListener('pointerup', (e) => {
            // Remove the light associated with this pointer
            const index = touchLights.findIndex(l => l.id === e.pointerId);
            if (index !== -1) {
                touchLights.splice(index, 1);
            }
        });
        canvas.addEventListener('pointercancel', (e) => {
             // Handle cancelled gestures (like incoming calls)
            const index = touchLights.findIndex(l => l.id === e.pointerId);
            if (index !== -1) {
                touchLights.splice(index, 1);
            }
        });

    </script>
</body>
</html>
