<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="JellyOrg">

    <title>Jelly Organization App</title>

    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
</head>
<body>

    <canvas id="jelly-canvas"></canvas>

    <div id="settings-btn" onclick="toggleSettings()">⚙️</div>

    <div id="settings-menu" class="glass-panel">
        <div class="close-settings" onclick="toggleSettings()">✕</div>
        
        <h2>Settings</h2>

        <div class="control-group">
            <label>Jelly Color</label>
            <input type="color" id="primaryPicker" value="#6c5ce7" oninput="updateColors()">
        </div>

        <div class="control-group">
            <label>Liquid Glow</label>
            <input type="color" id="secondaryPicker" value="#00cec9" oninput="updateColors()">
        </div>

        <div class="control-group">
            <label>Glass Blur</label>
            <input type="range" id="glassOpacity" min="0" max="0.3" step="0.01" value="0.05" oninput="updateColors()">
        </div>
    </div>

    <div id="ui-layer">
    <div class="label-grid">
        <input type="text" class="jelly-label" placeholder="Box 1" id="label-0">
        <input type="text" class="jelly-label" placeholder="Box 2" id="label-1">
        <input type="text" class="jelly-label" placeholder="Box 3" id="label-2">
        <input type="text" class="jelly-label" placeholder="Box 4" id="label-3">
        <input type="text" class="jelly-label" placeholder="Box 5" id="label-4">
        <input type="text" class="jelly-label" placeholder="Box 6" id="label-5">
        <input type="text" class="jelly-label" placeholder="Box 7" id="label-6">
        <input type="text" class="jelly-label" placeholder="Box 8" id="label-7">
        <input type="text" class="jelly-label" placeholder="Box 9" id="label-8">
    </div>
</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.18.0/matter.min.js"></script>
