<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Fluid Organizer</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #2d3436;
            --accent: linear-gradient(135deg, #6c5ce7, #a29bfe);
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: var(--bg);
            font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* 3x3 Grid Layout */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            width: 90vw; height: 80vh;
            gap: 15px;
            padding: 20px;
            box-sizing: border-box;
        }

        /* The Liquid Blobs */
        .grid-item {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            cursor: pointer;
            background: var(--accent);
            box-shadow: 0 10px 20px rgba(108, 92, 231, 0.2);
            animation: blobby 8s ease-in-out infinite;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            z-index: 10;
        }

        .grid-item span { font-weight: 600; font-size: 0.9rem; pointer-events: none; }

        /* Content inside the zoom - hidden by default */
        .content {
            display: none;
            opacity: 0;
            padding: 40px 20px;
            color: white;
            width: 100%;
            text-align: center;
        }

        /* The Zoom State */
        .grid-item.active {
            position: fixed !important;
            top: 0 !important; left: 0 !important;
            width: 100vw !important; height: 100vh !important;
            border-radius: 0 !important;
            z-index: 9999;
            animation: none;
        }

        .grid-item.active .content {
            display: block;
            opacity: 1;
            transition: opacity 0.5s 0.3s;
        }

        .grid-item.active span { display: none; }

        /* Close Button inside zoom */
        .close-btn {
            position: absolute;
            top: 50px; right: 30px;
            font-size: 2rem;
            display: none;
        }
        .grid-item.active .close-btn { display: block; }

        @keyframes blobby {
            0%, 100% { border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%; }
            33% { border-radius: 70% 30% 46% 54% / 30% 29% 71% 70%; }
            66% { border-radius: 100% 60% 60% 100% / 100% 100% 60% 60%; }
        }

        /* Organization UI Elements */
        .task-list { list-style: none; padding: 0; margin-top: 20px; text-align: left; }
        .task-item { 
            background: rgba(255,255,255,0.2); 
            padding: 15px; border-radius: 15px; 
            margin-bottom: 10px; backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

    <div class="grid-container">
        <div class="grid-item" onclick="toggleZoom(this)">
            <span>Tasks</span>
            <div class="close-btn">&times;</div>
            <div class="content">
                <h2>Today's Focus</h2>
                <div class="task-list">
                    <div class="task-item">✓ Morning Workout</div>
                    <div class="task-item">○ Code liquid UI</div>
                    <div class="task-item">○ GitHub push</div>
                </div>
            </div>
        </div>
        
        <div class="grid-item" onclick="toggleZoom(this)"><span>Calendar</span></div>
        <div class="grid-item" onclick="toggleZoom(this)"><span>Notes</span></div>
        <div class="grid-item" onclick="toggleZoom(this)"><span>Goals</span></div>
        <div class="grid-item" onclick="toggleZoom(this)"><span>Finance</span></div>
        <div class="grid-item" onclick="toggleZoom(this)"><span>Ideas</span></div>
        <div class="grid-item" onclick="toggleZoom(this)"><span>Health</span></div>
        <div class="grid-item" onclick="toggleZoom(this)"><span>Reading</span></div>
        <div class="grid-item" onclick="toggleZoom(this)"><span>Settings</span></div>
    </div>

    <script>
        function toggleZoom(el) {
            el.classList.toggle('active');
        }

        // Register Service Worker for Offline
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>
</body>
</html>
